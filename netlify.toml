# Netlify config for the static Council of Experts write-up.
#
# The deployable site is pre-built into ./site by scripts/build_site.py and
# committed, so there is no build step to run on Netlify — just publish the
# directory. Regenerate locally with:
#
#     uv run --extra bench python scripts/build_site.py
#
# then commit the updated site/ directory.

[build]
  publish = "site"
  command = ""

# Builds resumed (per Sam, 2026-07-17) after a pause since 2026-07-13.
# No [build.ignore] block: every push deploys. If deploy churn from
# docs-only commits ever becomes annoying, add:
#   [build.ignore]
#     command = "git diff --quiet HEAD^ HEAD -- site/"
# to deploy only when the published site/ directory changed.

# Serve the Results page (index.html) for the bare root. Netlify already maps
# /results -> results.html, /process -> process.html, etc. for the in-page
# links, so no per-page redirects are needed.

[[headers]]
  for = "/static/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
